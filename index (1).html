<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAgent AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f0f;
  color: #ffffff;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1a1a2e;
  padding: 15px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #333;
}
.header .dot {
  width: 12px;
  height: 12px;
  background: #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}
.header h1 { font-size: 20px; color: #00ff88; }
.header p { font-size: 12px; color: #888; margin-left: auto; }
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.message {
  display: flex;
  gap: 10px;
  max-width: 85%;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.user .avatar { background: #4f46e5; }
.agent .avatar { background: #065f46; }
.bubble {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.6;
}
.user .bubble {
  background: #4f46e5;
  border-bottom-right-radius: 4px;
}
.agent .bubble {
  background: #1e1e1e;
  border: 1px solid #333;
  border-bottom-left-radius: 4px;
}
.typing {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: #1e1e1e;
  border: 1px solid #333;
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}
.typing span {
  width: 8px;
  height: 8px;
  background: #00ff88;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}
.input-area {
  padding: 15px 20px;
  background: #1a1a1a;
  border-top: 1px solid #333;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
textarea {
  flex: 1;
  background: #2a2a2a;
  border: 1px solid #444;
  border-radius: 12px;
  padding: 12px 15px;
  color: #fff;
  font-size: 14px;
  resize: none;
  outline: none;
  max-height: 120px;
  font-family: 'Segoe UI', sans-serif;
}
textarea:focus { border-color: #00ff88; }
button {
  background: #00ff88;
  color: #000;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
}
button:hover { background: #00cc6a; transform: scale(1.05); }
button:disabled { background: #333; color: #666; transform: none; }
.welcome {
  text-align: center;
  padding: 40px 20px;
  color: #555;
}
.welcome h2 { color: #00ff88; font-size: 24px; margin-bottom: 10px; }
.welcome p { font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>
<div class="header">
  <div class="dot"></div>
  <h1>🎓 EduAgent</h1>
  <p>Powered by Llama 3</p>
</div>
<div class="chat-container" id="chat">
  <div class="welcome">
    <h2>Welcome to EduAgent! 👋</h2>
    <p>Your personal AI tutor.<br>Ask me anything you want to learn!</p>
  </div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Ask me anything..." rows="1"></textarea>
  <button id="sendBtn" onclick="sendMessage()">➤</button>
</div>
<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = this.scrollHeight + "px";
});
function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = `message ${sender}`;
  const avatar = sender === "user" ? "👤" : "🎓";
  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${text.replace(/\n/g, "<br>")}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function showTyping() {
  const div = document.createElement("div");
  div.className = "message agent";
  div.id = "typing";
  div.innerHTML = `
    <div class="avatar">🎓</div>
    <div class="typing">
      <span></span><span></span><span></span>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}
async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;
  addMessage(message, "user");
  input.value = "";
  input.style.height = "auto";
  sendBtn.disabled = true;
  showTyping();
  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });
    const data = await response.json();
    removeTyping();
    addMessage(data.reply, "agent");
  } catch (error) {
    removeTyping();
    addMessage("Sorry, something went wrong. Please try again.", "agent");
  }
  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
